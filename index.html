'use strict';
const $=id=>document.getElementById(id),el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!==undefined)e.innerHTML=h;return e},rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a,rA=a=>a[Math.floor(Math.random()*a.length)],R=()=>Math.random(),clone=o=>JSON.parse(JSON.stringify(o)),clamp=(v,l,h)=>Math.max(l,Math.min(h,v)),pct=(v,m)=>clamp(Math.round(v/m*100),0,100),fmt=n=>n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':''+n;
function notify(m){const n=$('NF');n.textContent=m;n.classList.add('show');clearTimeout(n._t);n._t=setTimeout(()=>n.classList.remove('show'),1800)}
function juice(t,a){const r=$('TS').getBoundingClientRect(),x=r.left+r.width/2+rnd(-25,25),y=r.top+15;const d=document.createElement('div');d.className='fn '+(t==='cash'?'fc':t==='xp'?'fx':t==='dmg'?'fd':t==='heal'?'fh':'ft');d.textContent=(t==='cash'?'+$':t==='dmg'?'-':t==='heal'?'+':'+')+a;d.style.left=x+'px';d.style.top=y+'px';document.body.appendChild(d);setTimeout(()=>d.remove(),1e3);if(t==='dmg')$('W').classList.add('shake'),setTimeout(()=>$('W').classList.remove('shake'),200)}
function showR(title,emoji,lines,btn,fn,big){const rp=$('RP'),bg=$('RX');let h=`<div class="re">${emoji}</div><div class="rt">${title}</div>`;lines.forEach(l=>h+=`<div class="rl">${l}</div>`);if(big)h+=`<div class="rb">+$${fmt(big)}</div>`;h+=`<button class="bt go" style="margin-top:10px;text-align:center" onclick="closeR();${fn||''}">${btn||'OK'}</button>`;rp.innerHTML=h;rp.style.display='block';bg.style.display='block';requestAnimationFrame(()=>requestAnimationFrame(()=>{rp.classList.add('show');bg.classList.add('show')}))}
function closeR(){$('RP').classList.remove('show');$('RX').classList.remove('show');setTimeout(()=>{$('RP').style.display='none';$('RX').style.display='none'},200)}
function openD(h){$('OB').innerHTML=h;$('OV').classList.add('A')}
function closeD(){$('OV').classList.remove('A')}

// ======================================================
// PROCEDURAL GENERATION — THE CORE INNOVATION
// ======================================================
const CITY_PRE=["New ","San ","Port ","","","","",""];
const CITY_NAMES=["Carbone","Valentino","Corsica","Palermo","Messina","Luciano","Ravenna","Torrino","Castellano","Marchetti","Savona","Navarro","Galante","Sienna","Verona","Calabria","Modena","Taranto"];
const STREET_PRE=["Old ","East ","West ","North ","South ","Upper ","Lower ","Little ",""];
const STREET_NAMES=["Vine St","Harbor Row","5th Ave","The Triangle","Mulberry Ln","Canal St","Ashton Blvd","Crescent Rd","Pike Alley","Ironworks","Bleecker","Mott St","Sullivan Pl","Prince Row","Baxter Ln","Cherry St","Hester","Pell St","Doyers","Bowery","Grand St","Orchard","Rivington","Ludlow","Essex","Broome","Spring St","Kenmare","Lafayette"];
const BLOCK_TYPES=[
{id:"commercial",n:"Commercial",e:"🏢",baseInc:15,baseHeat:0,risk:1,desc:"Shops and offices."},
{id:"residential",n:"Residential",e:"🏘",baseInc:8,baseHeat:0,risk:0,desc:"Apartments and families."},
{id:"industrial",n:"Industrial",e:"🏭",baseInc:12,baseHeat:1,risk:2,desc:"Factories and warehouses."},
{id:"waterfront",n:"Waterfront",e:"🚢",baseInc:18,baseHeat:1,risk:2,desc:"Docks and shipping."},

{id:"slum",n:"Slum",e:"🏚",baseInc:5,baseHeat:0,risk:3,desc:"Cheap and dangerous."}
];
const OPS=[
{id:"drug_corner",n:"Drug Corner",e:"💊",inc:25,heat:3,risk:2,cost:100,desc:"Move product on the street."},
{id:"protection",n:"Protection Racket",e:"💪",inc:20,heat:2,risk:1,cost:80,desc:"Businesses pay you."},
{id:"gambling",n:"Gambling Spot",e:"🎰",inc:30,heat:1,risk:1,cost:200,desc:"Underground games."},
{id:"chop",n:"Chop Shop",e:"🔧",inc:22,heat:2,risk:2,cost:150,desc:"Strip stolen cars."},
{id:"front",n:"Front Business",e:"🏪",inc:15,heat:0,risk:0,cost:250,desc:"Launder money. No heat."},
{id:"safehouse",n:"Safehouse",e:"🏠",inc:0,heat:-2,risk:0,cost:120,desc:"Heal here. Reduces heat."},
{id:"lab",n:"Drug Lab",e:"🧪",inc:40,heat:4,risk:3,cost:400,desc:"Cook product. High profit."},
{id:"arms_cache",n:"Arms Cache",e:"🔫",inc:35,heat:3,risk:3,cost:350,desc:"Supply guns."}
];
const TRAITS=["aggressive","cowardly","connected","corrupt","loyal","greedy","paranoid","ambitious"];

// BUILDINGS — tied to block types
const BLDS={
bar:{n:"Bar",e:"🍺",am:["Whiskey and regret.","Jukebox plays something sad.","Smoke hangs heavy."]},
diner:{n:"24hr Diner",e:"🍽",am:["Coffee's hot. Crowd's sketchy.","Grease and gossip."]},

const BLOCK_BLDS={
commercial:["bar","diner","pawnshop","hospital","fence","shark","hotel","recruiter"],
residential:["store","clinic","bar","diner","garage"],
industrial:["gym","guns","warehouse","chopshop","druglab","recruiter","safehouse_bld"],

};
const FM=["Tony","Vinnie","Marco","Sal","Frankie","Nicky","Joey","Paulie","Carmine","Luca","Mikey","Rocco","Gino","Enzo","Dominic","Vito","Bruno","Sonny","Carlo","Tommy","Dante","Leo","Matteo","Silvio","Eddie","Bobby","Richie","Angelo","Ralph","Jimmy","Pete","Louie","Freddy","Benny","Mick","Dex","Ray"];
const FF=["Sofia","Isabella","Val","Carmen","Rosa","Maria","Lucia","Adriana","Bianca","Elena","Gina","Nina","Angela","Carmela","Donna","Stella"];
const LN=["Moretti","Russo","Ferraro","Colombo","Esposito","Ricci","Bianchi","Greco","Mancini","Lombardi","Caruso","DeLuca","Romano","Gallo","Vitale","Costa","Marchetti","Conti","Amato","Santoro","Rizzo","Leone","Falcone","Napoli","Fontana","Carbone","Salerno","Savino","Pastore","Valenti","DiMaggio","Torrino","Navarro"];
const mkN=()=>(R()<.7?rA(FM):rA(FF))+' '+rA(LN);

function genCity(){
  const name=rA(CITY_PRE)+rA(CITY_NAMES);
  // Generate blocks
  const numBlocks=rnd(14,20);
  const usedNames=new Set();
  const blocks=[];
  for(let i=0;i<numBlocks;i++){
    let sn;do{sn=rA(STREET_PRE).trim()+(rA(STREET_PRE)?'':'')+rA(STREET_NAMES)}while(usedNames.has(sn));
    usedNames.add(sn);
    const type=rA(BLOCK_TYPES);
    const owner=R()<.3?null:{name:mkN(),trait:rA(TRAITS),str:rnd(15,40+i*3),willSell:R()<.3,sellPrice:rnd(80,250),relation:0};
    blocks.push({id:i,name:sn,type:type.id,typeData:type,owner,owned:false,op:null,opLv:1,soldiers:0,income:type.baseInc+rnd(-3,5),heat:type.baseHeat});
  }
  // Generate rival families — each owns 2-4 blocks
  const families=[];
  const famNames=[rA(LN),rA(LN),rA(LN)].filter((v,i,a)=>a.indexOf(v)===i);
  while(famNames.length<3)famNames.push(rA(LN));
  famNames.forEach((ln,fi)=>{
    const bossName=rA(FM)+' '+ln;
    const fam={name:'The '+ln+' Family',boss:bossName,bossHP:80+fi*40,bossMaxHP:80+fi*40,str:rnd(30,60)+fi*20,blocks:[],hostile:fi===0?true:false,respect:0};
    // Assign blocks to this family
    const available=blocks.filter(b=>!b.owned&&!b.owner);
    const count=rnd(2,Math.min(4,available.length));
    for(let j=0;j<count&&available.length;j++){
      const b=available.splice(rnd(0,available.length-1),1)[0];
      b.owner={name:rA(FM)+' '+ln,trait:rA(TRAITS),str:rnd(20,50),family:fi};
      b.familyIdx=fi;
      fam.blocks.push(b.id);
    }
    families.push(fam);
  });
  return{name,blocks,families};
}

// ======================================================
// CALCS
// ======================================================
function xpN(l){return 30+l*22}
function getRank(){const R2=[{n:"Nobody",e:"🐀",l:1},{n:"Runner",e:"🏃",l:3},{n:"Soldier",e:"🔫",l:6},{n:"Capo",e:"💼",l:10},{n:"Underboss",e:"🥃",l:15},{n:"Boss",e:"👑",l:20},{n:"Don",e:"🎩",l:25}];for(let i=R2.length-1;i>=0;i--)if(S.lv>=R2[i].l)return R2[i];return R2[0]}
function atkT(){let a=S.atk;const w=S.gear.w?ITEMS[S.gear.w]:null;if(w)a+=w.a;return a}
function defT(){let d=S.def;const ar=S.gear.a?ITEMS[S.gear.a]:null;if(ar)d+=ar.d;return d}
function threatLv(){return Math.floor((atkT()+defT()+S.lv*2+S.soldiers/4+S.respect/5)/5)}
function hasAb(a){return S.circle.some(c=>c.hp>0&&c.ab===a)}
function crimeBon(){return (hasAb('insight')?15:0)+Math.floor(S.respect/10)}
function heatRedux(){return (hasAb('fixer')?3:0)+Math.floor(S.respect/25)}
function comboM(){return 1+S.combo*.1}
function prestigeM(){return 1+S.prestige*.1}
function heatPen(){return S.heat>=80?.3:S.heat>=60?.15:S.heat>=40?.05:0}
// Income from owned blocks
function blockIncome(){if(!S.city)return 0;let t=0;S.city.blocks.filter(b=>b.owned).forEach(b=>{t+=Math.floor(b.income*(b.blockLv||1));if(b.op){const o=OPS.find(x=>x.id===b.op);if(o)t+=o.inc*(b.opLv||1)}});return Math.floor(t*(1-heatPen()))}
function weeklyUp(){let u=0;S.circle.forEach(c=>u+=c.wage);u+=S.soldiers*10;if(S.loan>0)u+=Math.ceil(S.loan*.15);return u}
function maxSoldiers(){return 5+S.lv*3+Math.floor(S.respect/2)}
function ownedBlocks(){return S.city?S.city.blocks.filter(b=>b.owned).length:0}
// Safe block data accessors
function bE(b){return b.typeData?.e||{commercial:'🏢',residential:'🏘',industrial:'🏭',waterfront:'🚢',nightlife:'🌃',slum:'🏚'}[b.type]||'📍'}
function bN(b){return b.typeData?.n||b.type||'Block'}

// THREAT SYSTEM — permanent escalation
// Threat rises when you: take blocks, kill bosses, run operations, grow army
// It NEVER decreases within a city. Only prestige resets it.
function addThreat(amt){S.threat=Math.min(100,S.threat+(amt||1))}
function threatDesc(){
  if(S.threat>=90)return{lv:5,n:'🔴 CRACKDOWN',d:'Government task force. Military raids. Asset seizure.',clr:'var(--rd)'};
  if(S.threat>=75)return{lv:4,n:'🟠 RICO',d:'Federal investigation. Businesses at risk.',clr:'#e86020'};
  if(S.threat>=50)return{lv:3,n:'🟡 FBI',d:'Feds are watching. Informants everywhere.',clr:'var(--gd)'};
  if(S.threat>=25)return{lv:2,n:'🟢 NOTICED',d:'Rivals getting serious. Cops asking questions.',clr:'var(--gn2)'};
  return{lv:1,n:'⚪ UNKNOWN',d:'Nobody knows your name yet.',clr:'var(--t3)'};
}
// Threat-based enemy scaling — higher threat = tougher everything
function threatScale(){return 1+S.threat*.008}
// Threat-based attack frequency on your blocks
function threatAttackChance(){return .05+S.threat*.002}
// Threat-based chance of FBI/RICO events
function threatEventChance(){return S.threat>=50?.04+S.threat*.002:0}

function upMap(){
  const tab=$('map-tab');tab.innerHTML='';
  if(!S.city)return;

  const owned=S.city.blocks.filter(b=>b.owned);
  const rival=S.city.blocks.filter(b=>!b.owned&&b.familyIdx!==undefined);
  const free=S.city.blocks.filter(b=>!b.owned&&b.familyIdx===undefined);

  tab.appendChild(el('div','sh','Your Blocks ('+owned.length+')'));
  if(owned.length){
    owned.forEach(b=>{
      const op=b.op?OPS.find(x=>x.id===b.op):null;const bLv=b.blockLv||1;
      const totalInc=Math.floor(b.income*bLv)+(op?op.inc*(b.opLv||1):0);
      const bc=el('div','blk owned');
      bc.innerHTML=`<div style="display:flex;align-items:center;gap:8px"><div style="font-size:20px">${bE(b)}</div><div style="flex:1"><div style="font-weight:700;font-size:12px">${b.name} <span style="font-size:9px;color:var(--gd)">Lv${bLv}</span></div><div style="font-size:10px;color:var(--t3)">${bN(b)}${op?' · '+op.e+' '+op.n+' Lv'+(b.opLv||1):' · No operation'}</div><div style="font-size:10px;color:var(--gn)">+$${totalInc}/wk</div></div></div>`;
      bc.onclick=()=>openBlock(b);
      tab.appendChild(bc);
    });
  } else tab.appendChild(el('div','cd','<div style="font-size:10px;color:var(--t3)">No blocks owned. Take some from the map below.</div>'));

  tab.appendChild(el('div','sh','Unclaimed ('+free.length+')'));
  free.forEach(b=>{
    const bc=el('div','blk free');
    bc.innerHTML=`<div style="display:flex;align-items:center;gap:8px"><div style="font-size:20px">${bE(b)}</div><div style="flex:1"><div style="font-weight:700;font-size:12px">${b.name}</div><div style="font-size:10px;color:var(--t3)">${bN(b)} · ${b.owner?b.owner.name+' ('+b.owner.trait+')':'Unclaimed'}</div><div style="font-size:10px;color:var(--t2)">Base income: $${b.income}/wk</div></div></div>`;
    bc.onclick=()=>openTakeBlock(b);
    tab.appendChild(bc);
  });

  if(rival.length){
    tab.appendChild(el('div','sh','Rival Territory ('+rival.length+')'));
    rival.forEach(b=>{
      const fam=S.city.families[b.familyIdx];
      const bc=el('div','blk rival');
      bc.innerHTML=`<div style="display:flex;align-items:center;gap:8px"><div style="font-size:20px">${bE(b)}</div><div style="flex:1"><div style="font-weight:700;font-size:12px">${b.name}</div><div style="font-size:10px;color:var(--rd)">${fam?.name||'Rival'} · ${b.owner?.name||'Unknown'}</div><div style="font-size:10px;color:var(--t2)">$${b.income}/wk · Str ${b.owner?.str||'?'}</div></div></div>`;
      bc.onclick=()=>openTakeBlock(b);
      tab.appendChild(bc);
    });
  }

  // RIVAL FAMILIES — moved here from hub
  tab.appendChild(el('div','sh','Rival Families'));
  S.city.families.forEach((f,fi)=>{
    const ownedByFam=S.city.blocks.filter(b=>b.familyIdx===fi&&!b.owned).length;
    const fc=el('div','cd'+(f.hostile?' dn':''));
    if(f.bossHP<=0){
      fc.innerHTML=`<div style="display:flex;align-items:center;gap:8px"><div style="font-size:24px">💀</div><div style="flex:1"><div style="font-weight:700;font-size:12px;text-decoration:line-through;color:var(--t3)">${f.name}</div><div style="font-size:10px;color:var(--t3)">Eliminated · ${f.boss} is dead</div></div></div>`;
    } else {
      fc.innerHTML=`<div style="display:flex;align-items:center;gap:8px"><div style="font-size:24px">${f.hostile?'⚔':'🤝'}</div><div style="flex:1"><div style="font-weight:700;font-size:12px">${f.name}</div><div style="font-size:10px;color:var(--t3)">Boss: ${f.boss} · ${ownedByFam} blocks · Str ${f.str}</div></div></div><div style="margin-top:4px"><div style="display:flex;justify-content:space-between;font-size:9px;color:var(--t3)"><span>Boss HP</span><span>${f.bossHP}/${f.bossMaxHP}</span></div><div class="bar"><div class="bf" style="width:${pct(f.bossHP,f.bossMaxHP)}%;background:var(--rd)"></div></div></div>`;
      if(f.hostile&&S.lv>=(fi+1)*5){const ab=el('button','bt dn','⚔ Attack Boss');ab.onclick=()=>{const e=[mkE('boss',fi*.15)];if(fi>=1)e.push(mkE('hitman',fi*.1));startCombat(e,'fam_'+fi)};fc.appendChild(ab)}
      else if(f.hostile){fc.appendChild(el('div','','<div style="font-size:9px;color:var(--t3);text-align:center;margin-top:3px">Req Lv'+(fi+1)*5+'</div>'))}
      if(!f.hostile){const hb=el('button','bt','😤 Provoke war');hb.onclick=()=>{f.hostile=true;S.respect+=3;log('Declared war on '+f.name+'.','q');upAll()};fc.appendChild(hb)}
    }
    tab.appendChild(fc);
  });
}

function openBlock(b){
  const op=b.op?OPS.find(x=>x.id===b.op):null;
  const bLv=b.blockLv||1;const maxBLv=5;
  const totalInc=Math.floor(b.income*bLv)+(op?op.inc*(b.opLv||1):0);
  let h=`<div style="text-align:center"><div style="font-size:36px">${bE(b)}</div><div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;margin:4px 0">${b.name}</div><div style="font-size:11px;color:var(--t2);margin-bottom:4px">${bN(b)} · Block Lv${bLv} · +$${totalInc}/wk</div></div>`;
  // BLOCK UPGRADE — increase base income but raises threat
  if(bLv<maxBLv){
    const blkUpCost=bLv*150+50;const incGain=b.income;
    h+=`<button class="bt go" style="text-align:center" onclick="upgradeBlock(${b.id})">🏗 Upgrade Block to Lv${bLv+1} · $${blkUpCost} · +$${incGain}/wk · ⚠+1 Threat</button>`;
  } else {
    h+=`<div style="font-size:10px;color:var(--gd);text-align:center;margin:4px 0">🏗 Block MAX LEVEL</div>`;
  }
  h+=`<div style="height:1px;background:var(--bd);margin:8px 0"></div>`;
  if(op){
    h+=`<div style="font-size:11px;color:var(--gn);margin-bottom:6px">${op.e} ${op.n} Lv${b.opLv||1} · +$${op.inc*(b.opLv||1)}/wk · +${op.heat} heat/wk</div>`;
    const upgCost=(b.opLv||1)*op.cost;
    h+=`<button class="bt go" style="text-align:center" onclick="upgradeOp(${b.id})">⬆ Upgrade Op $${upgCost}</button>`;

  } else {
    h+=`<div style="font-size:11px;color:var(--t3);margin-bottom:8px">No operation. Set one up:</div>`;

    });

function upgradeBlock(blockId){
  const b=S.city.blocks.find(x=>x.id===blockId);if(!b)return;
  const bLv=b.blockLv||1;const cost=bLv*150+50;
  if(S.cash<cost)return notify('Need $'+cost);
  S.cash-=cost;b.blockLv=(b.blockLv||1)+1;addThreat(1);
  log('🏗 '+b.name+' upgraded to Lv'+b.blockLv+'. +1 threat.','v');closeD();upAll();
}

function setOp(blockId,opId){
  const b=S.city.blocks.find(x=>x.id===blockId);const op=OPS.find(x=>x.id===opId);
  if(!b||!op)return;if(S.cash<op.cost)return notify('Need $'+op.cost);
  S.cash-=op.cost;b.op=opId;b.opLv=1;addThreat(1);
  log('Set up '+op.n+' on '+b.name+'. +1 threat.','v');closeD();upAll();
}
function upgradeOp(blockId){
  const b=S.city.blocks.find(x=>x.id===blockId);if(!b||!b.op)return;
  const op=OPS.find(x=>x.id===b.op);const cost=(b.opLv||1)*op.cost;
  if(S.cash<cost)return notify('Need $'+cost);
  S.cash-=cost;b.opLv=(b.opLv||1)+1;
  log('Upgraded '+op.n+' on '+b.name+' to Lv'+b.opLv+'.','v');closeD();upAll();
}
function removeOp(blockId){const b=S.city.blocks.find(x=>x.id===blockId);if(b)b.op=null;closeD();upAll()}
function abandonBlock(blockId){const b=S.city.blocks.find(x=>x.id===blockId);if(b){b.owned=false;b.op=null}closeD();upAll()}

function openTakeBlock(b){
  let h=`<div style="text-align:center"><div style="font-size:36px">${bE(b)}</div><div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;margin:4px 0">${b.name}</div><div style="font-size:11px;color:var(--t2);margin-bottom:4px">${bN(b)} · $${b.income}/wk potential</div></div>`;

  if(b.owner){
    h+=`<div style="font-size:11px;color:var(--t2);margin-bottom:8px">Controlled by <b>${b.owner.name}</b> (${b.owner.trait})${b.familyIdx!==undefined?' · '+S.city.families[b.familyIdx].name:''}</div>`;

    // Options depend on owner trait
    const fightCost=0;
    h+=`<button class="bt dn" style="text-align:center" onclick="takeBlockFight(${b.id})">⚔ Take by force (+heat)</button>`;

    if(b.owner.willSell){
      h+=`<button class="bt go" style="text-align:center" onclick="takeBlockBuy(${b.id})">💰 Buy out $${b.owner.sellPrice}</button>`;
    }

    if(b.owner.trait==='cowardly'||b.owner.trait==='corrupt'){
      const intCost=Math.floor((b.owner.sellPrice||100)*.4);
      h+=`<button class="bt" style="text-align:center" onclick="takeBlockIntimidate(${b.id})">😤 Intimidate $${intCost} (+respect)</button>`;
    }
  } else {
    h+=`<div style="font-size:11px;color:var(--t3);margin-bottom:8px">Unclaimed territory.</div>`;
    h+=`<button class="bt go" style="text-align:center" onclick="takeBlockClaim(${b.id})">🏴 Claim it (free, needs soldiers)</button>`;
  }
  h+=`<button class="bt" style="text-align:center" onclick="closeD()">← Back</button>`;
  openD(h);
}

function takeBlockFight(blockId){
  closeD();
  const b=S.city.blocks.find(x=>x.id===blockId);if(!b)return;
  const enemies=[mkE(b.familyIdx!==undefined?'rival':'enforcer')];
  if(b.owner?.str>30)enemies.push(mkE('gang'));
  S.heat=Math.min(100,S.heat+3);
  combat={enemies,round:0,log:[],done:false,ctx:'block_'+blockId};
  renderC();$('CO').style.display='flex';
}

function takeBlockBuy(blockId){
  const b=S.city.blocks.find(x=>x.id===blockId);if(!b||!b.owner)return;
  if(S.cash<b.owner.sellPrice)return notify('Need $'+b.owner.sellPrice);
  S.cash-=b.owner.sellPrice;b.owned=true;b.owner=null;
  if(b.familyIdx!==undefined){const fam=S.city.families[b.familyIdx];fam.blocks=fam.blocks.filter(id=>id!==b.id);b.familyIdx=undefined}
  addThreat(2);
  log('Bought '+b.name+'. +2 threat.','v');closeD();upAll();showR('Block Acquired!','🏴',[b.name+' is yours.','⚠ +2 Threat','Set up an operation!'],'OK','');
}

function takeBlockIntimidate(blockId){
  const b=S.city.blocks.find(x=>x.id===blockId);if(!b||!b.owner)return;
  const cost=Math.floor((b.owner.sellPrice||100)*.4);
  if(S.cash<cost)return notify('Need $'+cost);
  // Success depends on respect + trait
  const chance=b.owner.trait==='cowardly'?85:b.owner.trait==='corrupt'?70:50;
  if(R()*100<chance+S.respect){
    S.cash-=cost;b.owned=true;
    if(b.familyIdx!==undefined){S.city.families[b.familyIdx].blocks=S.city.families[b.familyIdx].blocks.filter(id=>id!==b.id);b.familyIdx=undefined}
    b.owner=null;S.respect+=2;S.heat=Math.min(100,S.heat+2);
    log('Intimidated owner of '+b.name+'. +2 respect.','v');closeD();upAll();showR('Intimidated!','😤',[b.name+' is yours.','+2 Respect'],'OK','');
  } else {
    S.cash-=cost;S.heat=Math.min(100,S.heat+3);
    log('Intimidation failed at '+b.name+'. Owner called cops.','c');closeD();upAll();showR('Failed!','😤',['Owner resisted.','+3 Heat'],'OK','');
  }
}

function takeBlockClaim(blockId){
  const b=S.city.blocks.find(x=>x.id===blockId);if(!b)return;
  if(S.soldiers<1)return notify('Need soldiers to claim');
  S.soldiers--;b.owned=true;b.owner=null;
  log('Claimed '+b.name+'.','v');closeD();upAll();showR('Claimed!','🏴',[b.name+' is yours.'],'OK','');
}

function upJobs(){
  const tab=$('jobs-tab');tab.innerHTML='';

  const mt=Math.floor(S.lv/3);
  CRIMES.forEach(cr=>{
    if(cr.tier>mt)return;
    const onCD=S.crimeCD[cr.id]>S.day;
    const odds=clamp(cr.base+Math.floor(S.lv*1.2)+crimeBon()-cr.tier*5-Math.floor(S.heat/10),10,95);
    const cLo=Math.floor((cr.cash[0]+S.lv*cr.tier*2)*comboM()*prestigeM());
    const cHi=Math.floor((cr.cash[1]+S.lv*cr.tier*2)*comboM()*prestigeM());

    if(onCD){card.appendChild(el('button','bt','⏳ '+(S.crimeCD[cr.id]-S.day)+'d'));card.lastChild.disabled=true;
      const adSkip=el('button','bt ad','📺 Skip cooldown');adSkip.onclick=(function(cid){return function(){S.crimeCD[cid]=0;upJobs()}})(cr.id);card.appendChild(adSkip)}
    else{const gb=el('button','bt go',cr.multi?'🎯 Plan':'Do it');gb.onclick=()=>cr.multi?doHeist(cr):doCrime(cr);card.appendChild(gb)}
    tab.appendChild(card);
  });
  CRIMES.forEach(cr=>{if(cr.tier<=mt)return;const c=el('div','cd');c.style.opacity='.2';c.innerHTML=`<div style="display:flex;gap:8px;align-items:center"><div style="font-size:20px">🔒</div><div style="font-weight:600;font-size:11px">${cr.n} — Lv${cr.tier*3}</div></div>`;tab.appendChild(c)});
}

function doCrime(cr){
  const odds=clamp(cr.base+Math.floor(S.lv*1.2)+crimeBon()-cr.tier*5-Math.floor(S.heat/10),10,95);
  const isHot=S.hotTip?.crime===cr.id&&S.hotTip.exp>S.day;const hm=isHot?S.hotTip.mult:1;
  const hg=Math.max(1,cr.ht-heatRedux());
  if(cr.cd)S.crimeCD[cr.id]=S.day+cr.cd;S.crimes++;
  if(R()*100<odds){
    S.combo++;S.maxCombo=Math.max(S.maxCombo,S.combo);
    const raw=rnd(cr.cash[0]+S.lv*cr.tier*2,cr.cash[1]+S.lv*cr.tier*2);
    const earned=Math.floor(raw*comboM()*hm*prestigeM());
    S.cash+=earned;S.xp+=cr.xp;S.heat=Math.min(100,S.heat+hg);S.earned+=earned;S.lifetimeEarned+=earned;S.respect++;
    let jack=R()<.08;if(jack){S.cash+=earned;S.earned+=earned;S.lifetimeEarned+=earned}
    log('✅ '+cr.n+': +$'+earned+(jack?' JACKPOT!':'')+' ×'+S.combo,'v');
    juice('cash',earned);if(isHot)S.hotTip=null;chkLU();dayTick();upAll();
    const lines=['💰 +$'+fmt(earned)+(S.combo>1?' (×'+S.combo+')':''),'+'+cr.xp+' XP','+'+hg+' Heat'];
    if(jack)lines.push('🎰 JACKPOT +$'+fmt(earned));
    showR(jack?'JACKPOT!':'Success!',jack?'🎰':cr.e,lines,'OK','',earned);
    // Ad
    setTimeout(()=>{const rp=$('RP');if(!rp?.classList.contains('show')||rp.querySelector('.bt.ad'))return;const ab=el('button','bt ad','📺 Double +$'+fmt(earned));ab.style.marginTop='2px';ab.onclick=()=>{S.cash+=earned;S.earned+=earned;S.lifetimeEarned+=earned;closeR();juice('cash',earned);upAll()};rp.querySelector('.bt.go')?.after(ab)},80);
  } else {
    const dmg=rnd(cr.fd[0],cr.fd[1]),lost=rnd(cr.fl[0],cr.fl[1]);
    S.hp=Math.max(1,S.hp-dmg);S.cash=Math.max(0,S.cash-lost);S.heat=Math.min(100,S.heat+hg+2);const oc=S.combo;S.combo=0;
    if(cr.tier>=2&&S.soldiers>0&&R()<.15){S.soldiers--;log('💀 Lost a soldier.','c')}
    log('❌ '+cr.n+' failed.'+(oc>1?' ×'+oc+' broken!':''),'c');if(dmg>0)juice('dmg',dmg);dayTick();upAll();
    showR('Failed!','💥',[dmg?'-'+dmg+' HP':'',lost?'-$'+lost:'','+'+(hg+2)+' Heat',oc>1?'×'+oc+' broken':''].filter(Boolean),'OK','');
  }
  if(S.heat>=70&&R()<.2)setTimeout(()=>{startCombat([mkE(S.heat>=90?'swat':'cop'),mkE('cop')],'police')},1e3);
}

function doHeist(cr){
  const steps=[{q:"Entry?",o:[["Front (fast)",{od:-8,ht:3}],["Side",{}],["Roof (quiet)",{od:5,ht:-3}]]},{q:"Guards?",o:[["Neutralize",{od:5,ht:4,dm:5}],["Sneak",{od:-5,ht:-2}],["Bribe $50",{od:10,co:50}]]},{q:"Grab?",o:[["Everything",{ca:1.5,ht:4,od:-10}],["Smart",{ca:1}],["Quick",{ca:.7,ht:-3,od:5}]]}];
  let cum={od:0,ht:0,ca:1,dm:0,co:0},step=0;
  function show(){const s=steps[step];let h=`<div style="text-align:center"><div style="font-size:40px">🏦</div><div style="font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--gd);letter-spacing:2px;margin:6px 0">STEP ${step+1}/${steps.length}</div><div style="margin-bottom:10px">${s.q}</div>`;s.o.forEach(([n,m],i)=>h+=`<button class="bt${i===1?' go':''}" style="text-align:center" onclick="hC(${step},${i})">${n}</button>`);h+=`<button class="bt dn" style="text-align:center;margin-top:4px" onclick="closeD()">Abort</button></div>`;openD(h)}
  window.hC=(si,ci)=>{const[,m]=steps[si].o[ci];cum.od+=(m.od||0);cum.ht+=(m.ht||0);cum.ca*=(m.ca||1);cum.dm+=(m.dm||0);cum.co+=(m.co||0);step++;if(step<steps.length)return show();closeD();
    if(cum.co>0&&S.cash<cum.co)return notify('Need $'+cum.co);S.cash-=(cum.co||0);
    const odds=clamp(cr.base+Math.floor(S.lv*1.2)+crimeBon()-cr.tier*5-Math.floor(S.heat/10)+cum.od,10,95);
    const hg=Math.max(1,cr.ht-heatRedux()+cum.ht);if(cr.cd)S.crimeCD[cr.id]=S.day+cr.cd;S.crimes++;
    if(R()*100<odds){S.combo++;S.maxCombo=Math.max(S.maxCombo,S.combo);
      const e2=Math.floor((rnd(cr.cash[0],cr.cash[1])+S.lv*cr.tier*3)*comboM()*cum.ca*prestigeM());
      S.cash+=e2;S.xp+=cr.xp;S.heat=Math.min(100,S.heat+hg);S.earned+=e2;S.lifetimeEarned+=e2;S.respect+=3;if(cum.dm>0)S.hp=Math.max(1,S.hp-cum.dm);
      log('🏦 HEIST! +$'+e2,'v');juice('cash',e2);chkLU();dayTick();upAll();showR('HEIST!','🏦',['+$'+fmt(e2),'+'+cr.xp+' XP','+3 Respect'],'OK','',e2)
    }else{const d=rnd(cr.fd[0],cr.fd[1])+cum.dm,l=rnd(cr.fl[0],cr.fl[1]);S.hp=Math.max(1,S.hp-d);S.cash=Math.max(0,S.cash-l);S.heat=Math.min(100,S.heat+hg+3);S.combo=0;
      if(S.soldiers>0&&R()<.25){const dead=rnd(1,2);S.soldiers=Math.max(0,S.soldiers-dead)}
      log('🏦 FAILED!','c');juice('dmg',d);dayTick();upAll();showR('Failed!','💥',['-'+d+' HP','-$'+l,'+'+(hg+3)+' Heat'],'OK','')}
  };show();
}

function startCombat(enemies,ctx){combat={enemies,round:0,log:[],done:false,ctx:ctx||''};renderC();$('CO').style.display='flex'}
function renderC(){
  const ea=$('EA'),aa=$('AA'),cl=$('CL'),ca=$('CA');ea.innerHTML='';aa.innerHTML='';cl.innerHTML=combat.log.slice(-8).join('<br>');ca.innerHTML='';
  combat.enemies.forEach(e=>ea.appendChild(Object.assign(el('div','cu'+(e.hp<=0?' dead':'')),{innerHTML:`<div class="ue">${e.e}</div><div class="un">${e.name}</div><div class="uh">❤${Math.max(0,e.hp)}</div>`})));
  aa.appendChild(Object.assign(el('div','cu'),{innerHTML:`<div class="ue">🤵</div><div class="un">YOU</div><div class="uh">❤${S.hp}</div>`}));
  S.circle.forEach(c=>{if(c.hp>0)aa.appendChild(Object.assign(el('div','cu'),{innerHTML:`<div class="ue">${c.e}</div><div class="un">${c.name.split(' ')[0]}</div><div class="uh">❤${c.hp}</div>`}))});
  if(combat.done)return;
  const ab=el('button','bt go','⚔ ATK');ab.style.flex='1';ab.style.textAlign='center';ab.onclick=()=>cRound('atk');ca.appendChild(ab);
  const fb=el('button','bt dn','🏃');fb.style.flex='1';fb.style.textAlign='center';fb.onclick=()=>{if(R()*100<30+escapeBonus()){combat.done=true;$('CO').style.display='none';upAll()}else{combat.log.push("Can't flee!");cRound('flee')}};ca.appendChild(fb);
  const hi=S.inv.filter(id=>ITEMS[id]?.heal);if(hi.length){const hb=el('button','bt','💊');hb.style.width='40px';hb.style.textAlign='center';hb.onclick=()=>{const id=hi[0],it=ITEMS[id];S.hp=Math.min(S.mhp,S.hp+it.heal);S.inv.splice(S.inv.indexOf(id),1);combat.log.push('+'+it.heal+'HP');cRound('heal')};ca.appendChild(hb)}
  cl.scrollTop=cl.scrollHeight;
}
function cRound(action){
  if(combat.done)return;combat.round++;
  if(action==='atk'){const ae=combat.enemies.filter(e=>e.hp>0);if(ae.length){const t=ae[0];const d=Math.max(1,atkT()-Math.floor(t.d/2)+rnd(-2,3));t.hp-=d;combat.log.push('You→'+t.name+' -'+d);if(t.hp>0&&t.hp<=t.mhp*.2&&hasAb('execute')){t.hp=0;combat.log.push('🎯 EXECUTED!')}if(t.hp<=0){combat.log.push(t.name+' DOWN');S.kills++}}}
  S.circle.forEach(c=>{if(c.hp<=0)return;const ae=combat.enemies.filter(e=>e.hp>0);if(!ae.length)return;const t=rA(ae);const d=Math.max(1,c.a-Math.floor(t.d/2)+rnd(-1,2));t.hp-=d;combat.log.push(c.name.split(' ')[0]+'→'+t.name+' -'+d);if(t.hp<=0){combat.log.push(t.name+' DOWN');S.kills++}});
  if(combat.enemies.every(e=>e.hp<=0)){
    combat.done=true;let xp=0,g=0;combat.enemies.forEach(e=>{xp+=e.xp;g+=e.g});
    S.xp+=xp;S.cash+=g;S.earned+=g;S.lifetimeEarned+=g;S.respect++;
    log('Won! +$'+g+' +'+xp+'XP','v');chkLU();renderC();$('CA').innerHTML='';
    const wb=el('button','bt go','OK');wb.style.textAlign='center';
    wb.onclick=()=>{$('CO').style.display='none';
      // Block capture on combat win
      if(combat.ctx.startsWith('block_')){const bid=parseInt(combat.ctx.replace('block_',''));const b=S.city?.blocks.find(x=>x.id===bid);if(b){b.owned=true;if(b.familyIdx!==undefined){S.city.families[b.familyIdx].blocks=S.city.families[b.familyIdx].blocks.filter(id=>id!==b.id);b.familyIdx=undefined}b.owner=null;S.respect+=2;addThreat(3);showR('Block Taken!','🏴',[b.name+' is yours.','+2 Respect','⚠ +3 Threat'],'OK','upAll()');return}}
      // Family boss damage
      if(combat.ctx.startsWith('fam_')){const fi=parseInt(combat.ctx.replace('fam_',''));const fam=S.city?.families[fi];if(fam){const dmg=rnd(25,45)+S.lv*4;fam.bossHP=Math.max(0,fam.bossHP-dmg);if(fam.bossHP<=0){const bounty=300*(fi+1);S.cash+=bounty;S.earned+=bounty;S.lifetimeEarned+=bounty;S.respect+=10;// Release their blocks
          fam.blocks.forEach(bid=>{const b=S.city.blocks.find(x=>x.id===bid);if(b){b.familyIdx=undefined;b.owner={name:mkN(),trait:rA(TRAITS),str:rnd(10,25),willSell:R()<.5,sellPrice:rnd(60,150)}}});
          fam.blocks=[];log('💀 '+fam.boss+' ELIMINATED!','q');addThreat(8);showR('BOSS DOWN!','💀',[fam.boss+' is finished.','+$'+fmt(bounty),'+10 Respect','⚠ +8 Threat — the city notices'],'OK','upAll()',bounty);return}
        else log('Damaged '+fam.boss+'. -'+dmg+'HP.','v')}}
      if(combat.ctx==='police'){S.jails++;S.heat=Math.max(0,S.heat-25)}
      upAll();showR('Victory!','🏆',['+$'+g,'+'+xp+' XP'],'OK','')};
    $('CA').appendChild(wb);return;
  }
  combat.enemies.forEach(e=>{if(e.hp<=0)return;const tgts=[{n:S.name,ref:'p'},...S.circle.filter(c=>c.hp>0).map(c=>({n:c.name,ref:c}))];const t=rA(tgts);const dv=t.ref==='p'?defT():(t.ref.d||0);let d=Math.max(1,e.a-Math.floor(dv/2)+rnd(-1,2));
    if(t.ref==='p'&&hasAb('bodyguard')&&R()<.25){const bg=S.circle.find(c=>c.hp>0&&c.ab==='bodyguard');if(bg){bg.hp=Math.max(0,bg.hp-d);combat.log.push(bg.name.split(' ')[0]+' blocks! -'+d);if(bg.hp<=0){combat.log.push(bg.name.split(' ')[0]+' DOWN!');log('💀 '+bg.name+' killed!','c')}return}}
    if(t.ref==='p'){S.hp=Math.max(0,S.hp-d);combat.log.push(e.name+'→You -'+d)}else{t.ref.hp=Math.max(0,t.ref.hp-d);combat.log.push(e.name+'→'+t.n.split(' ')[0]+' -'+d);if(t.ref.hp<=0){combat.log.push(t.n.split(' ')[0]+' DOWN!');log('💀 '+t.n+' killed!','c')}}});
  if(S.hp<=0){combat.done=true;const lost=Math.floor(S.cash*.25);S.cash=Math.max(0,S.cash-lost);S.combo=0;
    // INJURY SEVERITY — makes defeat matter
    const severity=R();let injuryText,injuryLines=[];
    if(severity<.08&&S.lv>3){
      // DEATH — game over. Restart with some prestige benefit
      renderC();$('CA').innerHTML='';
      const wb=el('button','bt dn','💀 You died.');wb.style.textAlign='center';
      wb.onclick=()=>{$('CO').style.display='none';
        showR('DEAD','💀',['You bled out on the street.','The city moves on without you.','Your reputation lives on...'],'Start Over','doNew()')};
      $('CA').appendChild(wb);
      log('💀 '+S.name+' is dead.','c');return;
    } else if(severity<.25){
      // CRITICAL — lose a stat point permanently, long recovery
      const stat=rA(['atk','def','spd']);S[stat]=Math.max(1,S[stat]-1);
      S.hp=Math.max(1,Math.floor(S.mhp*.15));S.day+=rnd(2,4);S.workedDay=S.day;
      injuryText='CRITICAL INJURY';
      injuryLines=['-$'+lost,'💀 Permanent -1 '+stat.toUpperCase(),'🏥 Hospitalized '+rnd(2,4)+' days','HP set to 15%'];
      log('🏥 Critical injury. -1 '+stat.toUpperCase()+'. Hospitalized.','c');
    } else if(severity<.55){
      // SERIOUS — HP halved, lose days
      S.hp=Math.max(1,Math.floor(S.mhp*.3));S.day+=rnd(1,2);S.workedDay=S.day;
      injuryText='SERIOUS INJURY';
      injuryLines=['-$'+lost,'🏥 Recovering '+rnd(1,2)+' days','HP set to 30%'];
      log('🏥 Serious injury. Recovering.','c');
    } else {
      // MINOR — knocked out, lose cash
      S.hp=Math.max(1,Math.floor(S.mhp*.5));
      injuryText='KNOCKED OUT';
      injuryLines=['-$'+lost,'Bruised but alive.','HP set to 50%'];
      log('Knocked out. -$'+lost+'.','c');
    }
    if(combat.ctx==='police'){S.jails++;S.heat=Math.max(0,S.heat-30);injuryLines.push('🚔 Arrested — -30 heat');log('Arrested.','c')}
    // Circle members might die
    S.circle.forEach(c=>{if(c.hp<=0)log('💀 '+c.name+' killed!','c')});
    S.circle=S.circle.filter(c=>c.hp>0);
    renderC();$('CA').innerHTML='';
    const wb=el('button','bt dn','Accept');wb.style.textAlign='center';
    wb.onclick=()=>{$('CO').style.display='none';dayTick();upAll();showR(injuryText,'🏥',injuryLines,'OK','')};
    $('CA').appendChild(wb);return}
  S.circle=S.circle.filter(c=>c.hp>0);renderC();
}
function escapeBonus(){return (hasAb('getaway')?30:0)+S.spd*5}

// ======================================================
function chkLU(){while(S.xp>=xpN(S.lv)){S.xp-=xpN(S.lv);S.lv++;S.sp++;S.mhp+=4;S.hp=Math.min(S.hp+10,S.mhp);log('⭐ Lv'+S.lv+' '+getRank().n,'q');notify('LEVEL '+S.lv)}if(S.sp>0)setTimeout(()=>{if(S.sp>0)openLU()},300)}
function openLU(){window._lu={atk:0,def:0,spd:0};rLU()}
function rLU(){const pts=S.sp-Object.values(window._lu).reduce((a,b)=>a+b,0);openD(`<div style="text-align:center"><div style="font-size:40px">⭐</div><div style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gd);letter-spacing:2px;margin:4px 0">LEVEL UP</div><div style="font-size:10px;margin-bottom:8px">Points: <b style="color:var(--gd)">${pts}</b></div>${[['⚔ATK','atk'],['🛡DEF','def'],['💨SPD','spd']].map(([l,k])=>`<div style="display:flex;align-items:center;gap:5px;padding:5px;margin:2px 0;background:var(--bg);border-radius:5px"><div style="flex:1;text-align:left;font-size:11px;font-weight:600">${l} <span style="font-size:9px;color:var(--t3)">${S[k]}→${S[k]+window._lu[k]}</span></div><button class="bt sm" onclick="aLU('${k}',-1)"${window._lu[k]<=0?' disabled':''}>−</button><div style="font-size:16px;font-weight:700;width:22px;text-align:center;color:var(--gd)">${window._lu[k]}</div><button class="bt sm go" onclick="aLU('${k}',1)"${pts<=0?' disabled':''}>+</button></div>`).join('')}<button class="bt go" style="text-align:center;margin-top:8px" onclick="cLU()">CONFIRM</button></div>`)}
function aLU(k,d){const pts=S.sp-Object.values(window._lu).reduce((a,b)=>a+b,0);if(d>0&&pts<=0)return;if(d<0&&window._lu[k]<=0)return;window._lu[k]+=d;rLU()}
function cLU(){const r=S.sp-Object.values(window._lu).reduce((a,b)=>a+b,0);if(r>0)return notify(r+' pts left');Object.entries(window._lu).forEach(([k,v])=>S[k]+=v);S.sp=0;closeD();upAll()}

// ======================================================
// DAY TICK
// ======================================================
function dayTick(){
  if(S.heat>0)S.heat=Math.max(0,S.heat-rnd(1,S.heat>=60?1:2));
  if(hasAb('fixer'))S.heat=Math.max(0,S.heat-2);
  if(hasAb('getaway'))S.heat=Math.max(0,S.heat-1);

  // WEEKLY
  if(S.day%7===0&&S.day!==S.lastPay){
    S.lastPay=S.day;
    const inc=Math.floor(blockIncome()*prestigeM());const up=weeklyUp();
    if(inc>0){S.cash+=inc;S.earned+=inc;S.lifetimeEarned+=inc;log('💰 Income: +$'+inc,'v')}
    if(up>0){if(S.cash>=up){S.cash-=up;log('💰 Upkeep: -$'+up,'n')}else{S.cash=0;S.circle.forEach(c=>c.loy=Math.max(0,c.loy-rnd(10,20)));if(S.soldiers>0){const d=Math.ceil(S.soldiers*.2);S.soldiers=Math.max(0,S.soldiers-d);log('💀 '+d+' soldiers deserted.','c')}log('⚠ Can\'t pay upkeep!','c')}}
    // Block operation heat
    if(S.city)S.city.blocks.filter(b=>b.owned&&b.op).forEach(b=>{const op=OPS.find(x=>x.id===b.op);if(op&&op.heat>0)S.heat=Math.min(100,S.heat+op.heat)});
    // Loan
    if(S.loan>0){const int=Math.ceil(S.loan*.15);S.loan+=int;log('🦈 Interest +$'+int+'. Owed $'+S.loan,'c');if(S.loan>500&&R()<.15){log('🦈 Enforcers!','c');setTimeout(()=>startCombat([mkE('enforcer'),mkE('enforcer')],'loan'),400)}}
    // Loyalty decay
    S.circle.forEach(c=>{c.loy=Math.max(0,c.loy-rnd(2,5));if(c.loy<=15&&R()<.3){log('💔 '+c.name+' betrayed you!','c');S.circle=S.circle.filter(x=>x!==c)}});
    // Rival family expansion — they fight back!
    if(S.city)S.city.families.forEach((f,fi)=>{if(f.bossHP<=0||!f.hostile)return;
      const myBlocks=S.city.blocks.filter(b=>b.owned);
      // Attack frequency scales with threat
      if(myBlocks.length&&R()<threatAttackChance()+fi*.03){
        const target=rA(myBlocks);
        if(S.soldiers>0&&R()<.6){S.soldiers--;log('⚔ '+f.name+' attacked '+target.name+'! Defended (lost 1 soldier).','c')}
        else{target.owned=false;target.op=null;target.blockLv=1;target.familyIdx=fi;f.blocks.push(target.id);target.owner={name:rA(FM)+' '+f.name.split(' ')[1],trait:rA(TRAITS),str:rnd(20,40)};log('⚔ '+f.name+' TOOK '+target.name+'!','c')}
      }
      if(S.soldiers>0&&R()<.05){S.soldiers--;log('💀 Soldier killed in skirmish.','c')}
    });

    // THREAT CONSEQUENCES — the permanent escalation
    // Threat 25+: Rivals get more aggressive (already handled above via threatAttackChance)
    // Threat grows passively from owning things
    const opsRunning=S.city?S.city.blocks.filter(b=>b.owned&&b.op).length:0;
    if(opsRunning>0)addThreat(Math.ceil(opsRunning/4));// +1 threat per 4 ops per week

    // Threat 50+: FBI — random chance to freeze a business temporarily
    if(S.threat>=50&&R()<threatEventChance()&&!S.pendingEvent){
      const biz=S.city?S.city.blocks.filter(b=>b.owned&&b.op):[];
      if(biz.length){
        const target=rA(biz);const opName=OPS.find(x=>x.id===target.op)?.n||'operation';
        S.pendingEvent={title:'🕵 FBI INVESTIGATION',desc:'Feds are looking into your '+opName+' on '+target.name+'.',
          opts:[{label:'Shut it down (lose op, -5 threat)',fn:()=>{target.op=null;S.threat=Math.max(0,S.threat-5);log('Shut down '+opName+' on '+target.name+' to avoid feds.','c')}},
                {label:'Bribe agent $'+Math.floor(S.threat*5)+' (risky)',fn:()=>{const cost=Math.floor(S.threat*5);if(S.cash<cost)return notify('Need $'+cost);S.cash-=cost;if(R()<.6){log('Bribed the fed. For now.','v')}else{target.op=null;S.heat=Math.min(100,S.heat+15);log('Bribe failed! Op shut down. +15 heat.','c')}}},
                {label:'Ignore it',fn:()=>{if(R()<.4){target.op=null;target.owned=false;S.heat=Math.min(100,S.heat+20);log('🚨 FBI seized '+target.name+'!','c')}else log('Feds backed off. For now.','v')}}]};
      }
    }

    // Threat 75+: RICO — chance to lose a business entirely
    if(S.threat>=75&&R()<.06&&!S.pendingEvent){
      const owned=S.city?S.city.blocks.filter(b=>b.owned):[];
      if(owned.length>2){
        const numSeized=rnd(1,Math.min(2,owned.length-1));
        const targets=[];for(let i=0;i<numSeized;i++){const t=rA(owned.filter(b=>!targets.includes(b)));if(t)targets.push(t)}
        S.pendingEvent={title:'⚖ RICO INDICTMENT',desc:'Federal prosecutors are building a case. '+numSeized+' block(s) at risk of seizure.',
          opts:[{label:'Lawyer up $'+Math.floor(S.threat*8)+' (fight it)',fn:()=>{const cost=Math.floor(S.threat*8);if(S.cash<cost)return notify('Need $'+cost);S.cash-=cost;if(R()<.5){log('Lawyers beat the case.','v');S.respect+=3}else{targets.forEach(t=>{t.owned=false;t.op=null;t.blockLv=1});log('⚖ RICO! Lost '+numSeized+' blocks.','c')}}},
                {label:'Prestige out — flee the city',fn:()=>{doPrestige()}}]};
      }
    }

    // Threat 90+: CRACKDOWN — massive raid, soldiers killed, cash seized
    if(S.threat>=90&&R()<.08&&!S.pendingEvent){
      const seized=Math.floor(S.cash*.3);const solLost=Math.ceil(S.soldiers*.4);
      S.pendingEvent={title:'🔴 GOVERNMENT CRACKDOWN',desc:'Task force raid. Military-grade operation. They\'re taking everything.',
        opts:[{label:'Fight back (combat, +heat)',fn:()=>{S.cash=Math.max(0,S.cash-seized);S.soldiers=Math.max(0,S.soldiers-solLost);S.heat=Math.min(100,S.heat+20);log('🔴 Crackdown! -$'+seized+', -'+solLost+' soldiers, +20 heat.','c');startCombat([mkE('swat'),mkE('swat'),mkE('cop')],'crackdown')}},
              {label:'Go underground — lay low',fn:()=>{S.cash=Math.max(0,S.cash-seized);S.soldiers=Math.max(0,S.soldiers-solLost);// Lose random blocks
                const owned=S.city?S.city.blocks.filter(b=>b.owned):[];const lose=Math.min(3,owned.length);
                for(let i=0;i<lose;i++){const t=rA(owned.filter(b=>b.owned));if(t){t.owned=false;t.op=null;t.blockLv=1}}
                S.heat=0;log('🔴 Crackdown! Lost $'+seized+', '+solLost+' soldiers, '+lose+' blocks. Heat cleared.','c')}},
              {label:'🔄 Prestige — flee to new city',fn:()=>{doPrestige()}}]};
    }
  }

  // Hot tip
  if(!S.hotTip&&R()<.1&&S.crimes>=3){const avail=CRIMES.filter(c=>c.tier<=Math.floor(S.lv/3));const tip=rA(avail);S.hotTip={crime:tip.id,mult:rA([2,2,3]),exp:S.day+rnd(2,4)};log('🔥 HOT TIP: '+tip.n+' '+S.hotTip.mult+'×!','q')}
  if(S.hotTip&&S.hotTip.exp<=S.day)S.hotTip=null;

  // Events
  if(R()<.06&&!S.pendingEvent)genEvent();
  save();
}

function genEvent(){
  const pool=[];
  if(S.circle.length)pool.push('arrest','betray');
  if(S.respect>=10)pool.push('alliance');
  if(S.heat>=30)pool.push('cop_shake');
  if(ownedBlocks()>0)pool.push('turf_hit');
  pool.push('opportunity');
  if(S.threat>=30)pool.push('informant');
  if(S.threat>=50)pool.push('witness');
  if(S.threat>=60)pool.push('asset_freeze');
  if(!pool.length)return;
  const evId=rA(pool);let title,desc,opts;
  switch(evId){
    case'arrest':{const c=rA(S.circle);const bail=rnd(50,150);title='🚔 ARRESTED';desc=c.name+' got picked up.';opts=[{label:'Pay bail $'+bail,fn:()=>{if(S.cash<bail)return notify('Need $'+bail);S.cash-=bail;c.loy=Math.min(100,c.loy+15)}},{label:'Let them rot',fn:()=>{S.circle=S.circle.filter(x=>x!==c)}}];break}
    case'betray':{const c=rA(S.circle);const stolen=rnd(30,100);title='💔 BETRAYAL';desc=c.name+' is skimming!';opts=[{label:'Confront (fight)',fn:()=>startCombat([mkE('enforcer')],'betray')},{label:'Forgive -$'+stolen,fn:()=>{S.cash=Math.max(0,S.cash-stolen);c.loy=Math.min(100,c.loy+20)}}];break}
    case'alliance':{title='🤝 ALLIANCE';desc='A rival wants peace.';opts=[{label:'Accept (-10 heat)',fn:()=>{S.heat=Math.max(0,S.heat-10)}},{label:'Refuse (+5 respect)',fn:()=>{S.respect+=5}}];break}
    case'cop_shake':{const cost=rnd(40,120);title='👮 SHAKEDOWN';desc='Cop wants more.';opts=[{label:'Pay $'+cost,fn:()=>{if(S.cash<cost)return notify('Need $'+cost);S.cash-=cost;S.heat=Math.max(0,S.heat-8)}},{label:'Threaten (+heat +rep)',fn:()=>{S.heat=Math.min(100,S.heat+10);S.respect+=3}}];break}
    case'turf_hit':{const blocks=S.city?S.city.blocks.filter(b=>b.owned):[];if(!blocks.length)return;const b=rA(blocks);title='⚔ TURF ATTACK';desc='Rivals hitting '+b.name+'!';opts=[{label:'Defend (fight)',fn:()=>startCombat([mkE('rival'),mkE('gang')],'block_def')},{label:'Abandon block',fn:()=>{b.owned=false;b.op=null;b.blockLv=1}}];break}
    case'opportunity':{const cash=rnd(80,300);title='💰 OPPORTUNITY';desc='Quick score.';opts=[{label:'Take it',fn:()=>{if(R()<.6){S.cash+=cash;S.earned+=cash;S.lifetimeEarned+=cash;juice('cash',cash);log('+$'+cash,'v')}else{S.hp=Math.max(1,S.hp-rnd(5,15));S.heat=Math.min(100,S.heat+5);log('Went bad.','c')}}},{label:'Pass',fn:()=>{}}];break}
    case'informant':{title='🐀 INFORMANT';desc='Someone is talking to the feds.';
      if(S.circle.length){const suspect=rA(S.circle);const real=R()<.5;
        opts=[{label:'Eliminate '+suspect.name.split(' ')[0],fn:()=>{S.circle=S.circle.filter(x=>x!==suspect);if(real){S.threat=Math.max(0,S.threat-3);log('Found the rat. -3 threat.','v')}else{log('Killed '+suspect.name+'. Innocent.','c');S.circle.forEach(c=>c.loy=Math.max(0,c.loy-15))}}},{label:'Ignore',fn:()=>{if(real){addThreat(3);log('Informant keeps feeding. +3 threat.','c')}}}]}
      else opts=[{label:'Stay vigilant',fn:()=>addThreat(1)}];break}
    case'witness':{const bc=rnd(100,300);title='👁 WITNESS';desc='Someone saw too much.';
      opts=[{label:'Pay off $'+bc,fn:()=>{if(S.cash<bc)return notify('Need $'+bc);S.cash-=bc;log('Witness handled.','v')}},{label:'Intimidate (+heat +threat)',fn:()=>{S.heat=Math.min(100,S.heat+8);addThreat(2);log('Witness intimidated.','v')}},{label:'Ignore',fn:()=>{addThreat(4);log('Witness testified. +4 threat.','c')}}];break}
    case'asset_freeze':{const frozen=Math.floor(S.cash*.2);title='🏦 ASSET FREEZE';desc='$'+frozen+' frozen by federal order.';
      opts=[{label:'Accept',fn:()=>{S.cash=Math.max(0,S.cash-frozen);log('$'+frozen+' seized.','c')}},{label:'Lawyer $'+Math.floor(frozen*.3),fn:()=>{const lc=Math.floor(frozen*.3);if(S.cash<lc)return notify('Need $'+lc);S.cash-=lc;if(R()<.5)log('Lawyers saved it.','v');else{S.cash=Math.max(0,S.cash-frozen);log('Lawyers failed. $'+frozen+' gone.','c')}}}];break}
  }
  if(title)S.pendingEvent={title,desc,opts};
}

// ======================================================
// NEW GAME
// ======================================================
function confirmNew(){openD(`<div style="text-align:center"><div style="font-size:40px">⚠️</div><div style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gd);margin:4px 0">START OVER?</div><button class="bt dn" style="text-align:center" onclick="doNew()">Delete</button><button class="bt" style="text-align:center" onclick="closeD()">Cancel</button></div>`)}
function doNew(){localStorage.removeItem('maf5');S=null;closeD();setTimeout(newGame,100)}
function newGame(){
  S=clone(BASE);const nm=mkN();window._nn=nm;
  const BG=[{n:'Street Kid',d:'Corners and concrete.',cash:40,atk:4,def:2,spd:4,items:['knife','bandage'],e:'🏃'},{n:'Ex-Bouncer',d:'Fists solve problems.',cash:60,atk:6,def:4,spd:2,items:['bat','medkit'],e:'💪'},{n:'Hustler',d:'Always an angle.',cash:100,atk:3,def:2,spd:5,items:['bandage','bandage'],e:'🎲'},{n:'Soldier',d:'Did time. Earned.',cash:50,atk:5,def:3,spd:3,items:['pistol','bandage'],e:'🔫'},{n:'Burglar',d:'Silent. Quick.',cash:70,atk:3,def:2,spd:6,items:['knife','bandage'],e:'🐱'}];
  const bg=rA(BG);window._bg=bg;
  openD(`<div style="text-align:center"><div style="font-size:48px;margin-bottom:4px">${bg.e}</div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px">${nm}</div><div style="font-size:12px;color:var(--gd);font-weight:600;margin:3px 0">${bg.n}</div><div style="font-size:11px;color:var(--t3);font-style:italic;margin-bottom:10px">${bg.d}</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;font-size:10px;margin-bottom:10px"><div style="background:var(--bg);padding:5px;border-radius:4px">⚔${bg.atk}</div><div style="background:var(--bg);padding:5px;border-radius:4px">🛡${bg.def}</div><div style="background:var(--bg);padding:5px;border-radius:4px">💨${bg.spd}</div></div><button class="bt go" style="text-align:center" onclick="startG()">BEGIN</button><button class="bt" style="text-align:center" onclick="closeD();newGame()">🔄 REROLL</button></div>`);
}
function startG(){
  const bg=window._bg;S.name=window._nn;S.atk=bg.atk;S.def=bg.def;S.spd=bg.spd;S.cash=bg.cash;S.inv=clone(bg.items);S.mhp=50+bg.def*3;S.hp=S.mhp;
  S.city=genCity();
  closeD();log(S.name+' arrives in '+S.city.name+'.','q');log(S.city.blocks.length+' blocks to conquer.','n');upAll();sw('hub');save();
}

// ======================================================
// INIT
// ======================================================
function init(){if(!load())newGame();else{const t=Math.floor(Date.now()/864e5);if(S.lastPlayed===t-1){S.streak++;if(S.streak%3===0){const b=S.streak*20;S.cash+=b;S.earned+=b;S.lifetimeEarned+=b;log('🔥 '+S.streak+'-day streak! +$'+b,'q')}}else if(S.lastPlayed!==t)S.streak=1;S.lastPlayed=t;save();upAll();sw('hub')}}
window.onload=init;
window.onerror=(m,u,l)=>{console.error('E:',m,l);return true};
document.addEventListener('visibilitychange',()=>{if(document.hidden&&S)save()});
window.addEventListener('pagehide',()=>{if(S)save()});
</script>
